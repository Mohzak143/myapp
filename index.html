<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#000;min-height:100vh;font-family:'DM Sans',sans-serif;color:#e2e8f0;overflow-x:hidden;overscroll-behavior:none;}
input,textarea,button{font-family:'DM Sans',sans-serif;}

.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}
.center-screen{align-items:center;justify-content:center;padding:2rem;}

/* HOME */
#home{align-items:center;justify-content:center;background:#000;}
.mic-ring{width:140px;height:140px;border-radius:50%;border:1px solid #222;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;}
.mic-ring.listening{border-color:#444;box-shadow:0 0 0 0 rgba(255,255,255,0.15);animation:sonar 1.5s ease-out infinite;}
.mic-ring.heart-mode{border-color:#333;}
.mic-ring.heart-mode.listening{animation:sonar 1.5s ease-out infinite;}
.mic-disc{width:96px;height:96px;border-radius:50%;background:#0a0a0a;border:1px solid #1a1a1a;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
.listening .mic-disc{background:#111;border-color:#333;}
@keyframes sonar{0%{box-shadow:0 0 0 0 rgba(255,255,255,0.2);}100%{box-shadow:0 0 0 30px rgba(255,255,255,0);}}

.mic-icon path,.mic-icon rect,.mic-icon line{stroke:#fff;}

.wave-row{display:flex;align-items:center;gap:4px;height:24px;margin-top:2rem;opacity:0;transition:opacity 0.4s;}
.wave-row.on{opacity:1;}
.wb{width:3px;border-radius:3px;background:#fff;animation:wb 0.9s ease-in-out infinite;}
.wb:nth-child(1){height:5px;animation-delay:0s;}
.wb:nth-child(2){height:12px;animation-delay:0.1s;}
.wb:nth-child(3){height:20px;animation-delay:0.2s;}
.wb:nth-child(4){height:12px;animation-delay:0.3s;}
.wb:nth-child(5){height:5px;animation-delay:0.4s;}
@keyframes wb{0%,100%{transform:scaleY(0.3);}50%{transform:scaleY(1);}}

.status{font-size:12px;color:#333;margin-top:1.5rem;letter-spacing:0.04em;min-height:18px;transition:color 0.3s;text-align:center;}
.status.on{color:#666;}

.settings-btn{position:absolute;bottom:2rem;right:1.5rem;width:36px;height:36px;border-radius:50%;border:1px solid #1a1a1a;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;}

/* SETTINGS */
#settings-panel{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #1a1a1a;padding:1.5rem;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform 0.3s ease;z-index:100;}
#settings-panel.open{transform:translateY(0);}
.sp-title{font-size:11px;color:#444;letter-spacing:0.08em;margin-bottom:1rem;text-transform:uppercase;}
.sp-input{width:100%;background:#000;border:1px solid #1a1a1a;border-radius:8px;padding:12px 14px;font-size:13px;color:#888;outline:none;}
.sp-input:focus{border-color:#333;}
.sp-save{margin-top:8px;width:100%;background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:12px;font-size:13px;color:#666;cursor:pointer;}
.sp-reset{margin-top:6px;width:100%;background:#0a0a0a;border:1px solid #2a1010;border-radius:8px;padding:12px;font-size:13px;color:#663333;cursor:pointer;}
.sp-close{position:absolute;top:1rem;right:1rem;font-size:20px;color:#333;cursor:pointer;background:none;border:none;}

/* PIN */
.lock-wrap{display:flex;flex-direction:column;align-items:center;width:100%;}
.step-lbl{font-size:10px;color:#333;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.step-title{font-size:18px;font-weight:400;color:#888;margin-bottom:2rem;text-align:center;}
.pin-row{display:flex;gap:16px;margin-bottom:2rem;}
.pd{width:14px;height:14px;border-radius:50%;border:1px solid #222;background:transparent;transition:all 0.2s;}
.pd.on{background:#fff;border-color:#fff;}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:260px;}
.pk{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:18px 10px;font-size:22px;font-weight:300;color:#888;cursor:pointer;text-align:center;transition:all 0.15s;user-select:none;}
.pk:active{background:#111;transform:scale(0.95);color:#fff;}
.pk.del{font-size:16px;color:#333;}
.pk.empty{visibility:hidden;pointer-events:none;}
.f-err{font-size:12px;color:#663333;min-height:18px;margin-top:0.75rem;text-align:center;}

/* Voice */
.v-mic{width:80px;height:80px;border-radius:50%;border:1px solid #222;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;margin-bottom:1rem;}
.v-mic.on{border-color:#444;box-shadow:0 0 0 0 rgba(255,255,255,0.1);animation:sonar 1.5s infinite;}
.v-mic-in{width:56px;height:56px;border-radius:50%;background:#0a0a0a;display:flex;align-items:center;justify-content:center;}
.v-status{font-size:12px;color:#333;min-height:18px;text-align:center;}
.v-recorded{font-size:12px;color:#555;margin-top:6px;text-align:center;}
.step-btn{margin-top:1.5rem;background:#0a0a0a;border:1px solid #222;border-radius:10px;padding:13px 36px;font-size:14px;color:#666;cursor:pointer;}
.sw-inp{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:14px 16px;font-size:16px;color:#888;width:100%;max-width:260px;outline:none;text-align:center;letter-spacing:0.12em;}
.sw-inp:focus{border-color:#333;}

/* PROGRESS */
.progress-bar{display:flex;gap:6px;margin-bottom:2.5rem;width:200px;}
.pb-seg{height:1px;flex:1;background:#1a1a1a;transition:background 0.3s;}
.pb-seg.done{background:#444;}
.pb-seg.active{background:#888;}

/* HEART */
#heart{background:#000;}
.h-nav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.25rem 0;}
.h-nav-title{font-size:10px;color:#222;letter-spacing:0.15em;text-transform:uppercase;}
.nav-close{width:34px;height:34px;border-radius:50%;border:1px solid #1a1a1a;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#333;font-size:16px;}
.h-body{flex:1;padding:1rem 1.25rem 1.5rem;display:flex;flex-direction:column;gap:10px;overflow-y:auto;}

.voice-dump-card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:14px;padding:1.25rem;}
.card-lbl{font-size:10px;color:#222;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;}
.dump-txt{font-size:14px;color:#333;line-height:1.7;min-height:52px;word-break:break-word;}
.dump-txt.filled{color:#888;}
.dump-ctrl{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid #111;}
.d-mic{width:42px;height:42px;border-radius:50%;border:1px solid #1a1a1a;background:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.2s;}
.d-mic.on{border-color:#444;background:#111;}
.d-mic-lbl{font-size:12px;color:#333;}

.h-textarea{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:14px;padding:1rem 1.25rem;font-size:14px;color:#888;line-height:1.7;outline:none;width:100%;resize:none;min-height:90px;}
.h-textarea:focus{border-color:#333;}
.h-textarea::placeholder{color:#222;}

.send-btn{width:100%;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:14px;padding:15px;font-size:13px;color:#444;cursor:pointer;transition:all 0.2s;}
.send-btn:not(:disabled):active{border-color:#444;color:#888;transform:scale(0.98);}
.send-btn:disabled{opacity:0.3;cursor:not-allowed;}

.ai-card{background:#050505;border:1px solid #1a1a1a;border-radius:14px;padding:1.25rem;display:none;}
.ai-card.on{display:block;}
.ai-card-lbl{font-size:10px;color:#222;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;}
.ai-text{font-size:13px;color:#666;line-height:1.8;}
.mood-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.mchip{font-size:10px;padding:3px 10px;border-radius:20px;background:#0a0a0a;color:#444;border:1px solid #1a1a1a;}
.thinking{display:flex;gap:5px;align-items:center;padding:2px 0;}
.thdot{width:6px;height:6px;border-radius:50%;background:#222;animation:thpulse 1.2s ease-in-out infinite;}
.thdot:nth-child(2){animation-delay:0.2s;}
.thdot:nth-child(3){animation-delay:0.4s;}
@keyframes thpulse{0%,80%,100%{opacity:0.15;}40%{opacity:1;}}

.entries-section{margin-top:4px;}
.entries-lbl{font-size:10px;color:#1a1a1a;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.entry-card{background:#050505;border:1px solid #111;border-radius:10px;padding:0.875rem 1rem;margin-bottom:6px;}
.entry-date{font-size:10px;color:#222;margin-bottom:5px;}
.entry-text{font-size:12px;color:#333;line-height:1.6;}
.entry-moods{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.em{font-size:10px;padding:2px 7px;border-radius:20px;background:#0a0a0a;color:#333;border:1px solid #111;}

/* BIZ */
#biz{background:#000;}
.biz-nav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.25rem 0;}
.biz-nav-title{font-size:10px;color:#222;letter-spacing:0.15em;text-transform:uppercase;}
.biz-body{flex:1;padding:1rem 1.25rem 1.5rem;display:flex;flex-direction:column;gap:10px;overflow-y:auto;}
.biz-voice-card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:14px;padding:1.25rem;}
.biz-dump-txt{font-size:14px;color:#333;line-height:1.7;min-height:52px;word-break:break-word;}
.biz-dump-txt.filled{color:#888;}
.biz-ctrl{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid #111;}
.b-mic{width:42px;height:42px;border-radius:50%;border:1px solid #1a1a1a;background:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.2s;}
.b-mic.on{border-color:#444;background:#111;}
.b-mic-lbl{font-size:12px;color:#333;}
.tag-row{display:flex;gap:7px;flex-wrap:wrap;}
.tg{font-size:11px;padding:6px 14px;border-radius:20px;border:1px solid #1a1a1a;background:transparent;color:#333;cursor:pointer;transition:all 0.15s;}
.tg.sel{background:#111;color:#888;border-color:#333;}
.biz-save{width:100%;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:14px;padding:15px;font-size:13px;color:#444;cursor:pointer;transition:all 0.2s;}
.biz-save:active{border-color:#333;color:#888;transform:scale(0.98);}
.notes-hdr{font-size:10px;color:#222;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.nc{background:#0a0a0a;border:1px solid #111;border-radius:10px;padding:0.875rem 1rem;margin-bottom:7px;}
.nc-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.ntag{font-size:10px;padding:2px 8px;border-radius:20px;background:#111;color:#555;border:1px solid #1a1a1a;}
.ntime{font-size:10px;color:#222;margin-left:auto;}
.ntext{font-size:13px;color:#555;line-height:1.6;}
.no-notes{font-size:13px;color:#1a1a1a;text-align:center;padding:2rem 0;}

.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:#0a0a0a;color:#666;font-size:12px;padding:8px 16px;border-radius:20px;border:1px solid #1a1a1a;z-index:200;}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active" style="position:relative;">
  <div class="mic-ring" id="mainMic" onclick="homeVoice()">
    <div class="mic-disc">
      <svg class="mic-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke-width="1.2">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </div>
  </div>
  <div class="wave-row" id="homeWave">
    <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
  </div>
  <div class="status" id="homeStatus"></div>
  <div class="settings-btn" onclick="toggleSettings()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings-panel">
  <button class="sp-close" onclick="toggleSettings()">&#x2715;</button>
  <div class="sp-title">Gemini API Key</div>
  <input class="sp-input" id="geminiKeyInput" type="password" placeholder="AIzaSy..."/>
  <button class="sp-save" onclick="saveKey()">Save Key</button>
  <button class="sp-reset" onclick="resetApp()">Reset App — forget PIN & phrases</button>
</div>

<!-- SETUP -->
<div id="setup" class="screen center-screen" style="background:#000;">
  <div class="lock-wrap">
    <div class="progress-bar">
      <div class="pb-seg" id="ps1"></div>
      <div class="pb-seg" id="ps2"></div>
      <div class="pb-seg" id="ps3"></div>
    </div>
    <div class="step-lbl" id="setupStepLbl">STEP 1 OF 3</div>
    <div class="step-title" id="setupTitle">Create PIN</div>
    <div class="pin-row" id="setupDots">
      <div class="pd" id="spd0"></div><div class="pd" id="spd1"></div>
      <div class="pd" id="spd2"></div><div class="pd" id="spd3"></div>
    </div>
    <div class="pin-grid" id="setupPinGrid"></div>
    <div class="v-mic" id="setupVMic" onclick="setupVoiceRec()" style="display:none;">
      <div class="v-mic-in">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.2">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </div>
    </div>
    <div class="v-status" id="setupVStatus"></div>
    <div class="v-recorded" id="setupVRecorded"></div>
    <input class="sw-inp" id="setupWordInp" type="password" placeholder="secret word" style="display:none;"/>
    <button class="step-btn" id="setupNextBtn" onclick="setupAdvance()" style="display:none;">Continue</button>
    <div class="f-err" id="setupErr"></div>
  </div>
</div>

<!-- LOCK PIN -->
<div id="lock" class="screen center-screen" style="background:#000;">
  <div class="lock-wrap">
    <div class="step-lbl">STEP 1 OF 2</div>
    <div class="step-title">PIN</div>
    <div class="pin-row">
      <div class="pd" id="lpd0"></div><div class="pd" id="lpd1"></div>
      <div class="pd" id="lpd2"></div><div class="pd" id="lpd3"></div>
    </div>
    <div class="pin-grid" id="lockPinGrid"></div>
    <div class="f-err" id="lockErr"></div>
  </div>
</div>

<!-- LOCK SECRET WORD -->
<div id="sword" class="screen center-screen" style="background:#000;">
  <div class="lock-wrap">
    <div class="step-lbl">STEP 2 OF 2</div>
    <div class="step-title">Secret word</div>
    <input class="sw-inp" id="swordInp" type="password" placeholder="your word"/>
    <button class="step-btn" style="margin-top:1rem;" onclick="checkSword()">Open</button>
    <div class="f-err" id="swordErr"></div>
  </div>
</div>

<!-- HEART -->
<div id="heart" class="screen">
  <div class="h-nav">
    <span class="h-nav-title">private</span>
    <div class="nav-close" onclick="goHome()">&#x2715;</div>
  </div>
  <div class="h-body">
    <div class="voice-dump-card">
      <div class="card-lbl">voice</div>
      <div class="dump-txt" id="dumpTxt">Tap mic — bolo jo dil mein hai...</div>
      <div class="dump-ctrl">
        <div class="d-mic" id="dMic" onclick="dumpVoice()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </div>
        <span class="d-mic-lbl" id="dMicLbl">Tap to speak</span>
      </div>
    </div>
    <textarea class="h-textarea" id="heartTxt" placeholder="Ya type karo..." rows="3"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendHeart()">Analyze →</button>
    <div class="ai-card" id="aiCard">
      <div class="ai-card-lbl">analysis</div>
      <div id="aiContent"></div>
    </div>
    <div class="entries-section" id="entriesSection"></div>
  </div>
</div>

<!-- BIZ -->
<div id="biz" class="screen">
  <div class="biz-nav">
    <span class="biz-nav-title">brain</span>
    <div class="nav-close" onclick="goHome()">&#x2715;</div>
  </div>
  <div class="biz-body">
    <div class="biz-voice-card">
      <div class="card-lbl" style="color:#222;">voice</div>
      <div class="biz-dump-txt" id="bizTxt">Tap mic — share your idea...</div>
      <div class="biz-ctrl">
        <div class="b-mic" id="bMic" onclick="bizVoice()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </div>
        <span class="b-mic-lbl" id="bMicLbl">Tap to record</span>
      </div>
    </div>
    <div class="tag-row">
      <div class="tg sel" id="tg-idea" onclick="pickTag('idea')">idea</div>
      <div class="tg" id="tg-task" onclick="pickTag('task')">task</div>
      <div class="tg" id="tg-reminder" onclick="pickTag('reminder')">reminder</div>
    </div>
    <button class="biz-save" onclick="saveBiz()">Save note</button>
    <div class="notes-hdr">saved</div>
    <div id="notesContainer"></div>
  </div>
</div>

<script>
const K={PIN:'_p',WORD:'_w',NOTES:'_n',SETUP:'_s',GKEY:'_g',HENTRIES:'_h'};
let app={listening:false,setupPin:'',setupStep:1,lockPin:'',bizCapture:'',dumpCapture:'',selTag:'idea',rec:null};

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function goHome(){
  app.listening=false;app.lockPin='';app.bizCapture='';app.dumpCapture='';
  document.getElementById('mainMic').className='mic-ring';
  document.getElementById('homeWave').classList.remove('on');
  document.getElementById('homeStatus').textContent='';
  document.getElementById('aiCard').classList.remove('on');
  document.getElementById('heartTxt').value='';
  document.getElementById('dumpTxt').textContent='Tap mic — bolo jo dil mein hai...';
  document.getElementById('dumpTxt').classList.remove('filled');
  document.getElementById('bizTxt').textContent='Tap mic — share your idea...';
  document.getElementById('bizTxt').classList.remove('filled');
  show('home');
}

function setupDone(){return !!localStorage.getItem(K.SETUP);}

function toggleSettings(){
  document.getElementById('settings-panel').classList.toggle('open');
  const s=localStorage.getItem(K.GKEY)||'';
  if(s)document.getElementById('geminiKeyInput').value=s;
}

function saveKey(){
  const k=document.getElementById('geminiKeyInput').value.trim();
  if(k){localStorage.setItem(K.GKEY,k);toggleSettings();showToast('Key saved!');}
}

function resetApp(){
  if(confirm('Sab reset ho jayega — PIN, secret word. Sure?')){
    const gkey=localStorage.getItem(K.GKEY);
    const notes=localStorage.getItem(K.NOTES);
    localStorage.clear();
    if(gkey)localStorage.setItem(K.GKEY,gkey);
    if(notes)localStorage.setItem(K.NOTES,notes);
    toggleSettings();goHome();showToast('Reset ho gaya!');
  }
}

function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2000);
}

/* VOICE ROUTING */
const HW=['dil','feel','heart','rona','khushi','takleef','dard','soch','andar','secret','mera','meri','akela','alone','mushkil','zindagi','raat','gussa','dar','baat','mann','khud','apna','udas','pareshan'];
const BW=['idea','business','kaam','work','project','plan','task','reminder','note','paise','money','startup','client','meeting','call','product','brand','market','launch'];

function homeVoice(){
  if(app.listening)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setStatus('Voice not supported');return;}
  const r=new SR();r.continuous=false;r.interimResults=true;r.lang='en-US';
  app.listening=true;
  document.getElementById('mainMic').classList.add('listening');
  document.getElementById('homeWave').classList.add('on');
  setStatus('listening...');
  r.onresult=e=>{
    const t=Array.from(e.results).map(x=>x[0].transcript).join('').toLowerCase();
    if(e.results[e.results.length-1].isFinal){
      app.listening=false;
      document.getElementById('mainMic').classList.remove('listening');
      document.getElementById('homeWave').classList.remove('on');
      route(t);
    }
  };
  r.onerror=()=>{app.listening=false;document.getElementById('mainMic').classList.remove('listening');document.getElementById('homeWave').classList.remove('on');setStatus('Try again');};
  r.onend=()=>{app.listening=false;document.getElementById('mainMic').classList.remove('listening');document.getElementById('homeWave').classList.remove('on');};
  r.start();app.rec=r;
}

function route(text){
  let h=0,b=0;
  HW.forEach(w=>{if(text.includes(w))h++;});
  BW.forEach(w=>{if(text.includes(w))b++;});
  if(h>=b){
    setStatus('opening...');
    setTimeout(()=>{if(!setupDone())startSetup();else startLock();},400);
  } else {
    setStatus('opening...');
    setTimeout(()=>{loadNotes();show('biz');},400);
  }
}

function setStatus(msg){
  const s=document.getElementById('homeStatus');s.textContent=msg;s.className='status on';
}

/* SETUP — only PIN + secret word (voice removed for simplicity) */
function startSetup(){
  app.setupStep=1;app.setupPin='';
  renderSetup();show('setup');
}

function renderSetup(){
  const s=app.setupStep;
  [1,2,3].forEach(i=>{
    const el=document.getElementById('ps'+i);
    el.className='pb-seg'+(i<s?' done':i===s?' active':'');
  });
  document.getElementById('setupPinGrid').style.display='none';
  document.getElementById('setupVMic').style.display='none';
  document.getElementById('setupWordInp').style.display='none';
  document.getElementById('setupNextBtn').style.display='none';
  document.getElementById('setupDots').style.display='none';
  document.getElementById('setupErr').textContent='';
  document.getElementById('setupVRecorded').textContent='';

  if(s===1){
    document.getElementById('setupStepLbl').textContent='STEP 1 OF 2';
    document.getElementById('setupTitle').textContent='Create PIN';
    document.getElementById('setupDots').style.display='flex';
    document.getElementById('setupPinGrid').style.display='grid';
    app.setupPin='';updateDots('',true);buildPinGrid('setup');
  } else if(s===2){
    document.getElementById('setupStepLbl').textContent='STEP 2 OF 2';
    document.getElementById('setupTitle').textContent='Secret word';
    document.getElementById('setupWordInp').style.display='block';
    document.getElementById('setupNextBtn').style.display='block';
  }
}

function updateDots(pin,isSetup){
  const p=isSetup?'spd':'lpd';
  for(let i=0;i<4;i++){const d=document.getElementById(p+i);if(d)d.classList.toggle('on',i<pin.length);}
}

function buildPinGrid(mode){
  const grid=document.getElementById(mode==='setup'?'setupPinGrid':'lockPinGrid');
  grid.innerHTML='';
  [1,2,3,4,5,6,7,8,9,'empty',0,'del'].forEach(n=>{
    const d=document.createElement('div');
    if(n==='empty'){d.className='pk empty';grid.appendChild(d);return;}
    d.className='pk'+(n==='del'?' del':'');
    d.textContent=n==='del'?'⌫':n;
    d.onclick=()=>mode==='setup'?handleSetupPin(String(n)):handleLockPin(String(n));
    grid.appendChild(d);
  });
}

function handleSetupPin(v){
  if(v==='del')app.setupPin=app.setupPin.slice(0,-1);
  else if(app.setupPin.length<4)app.setupPin+=v;
  updateDots(app.setupPin,true);
  if(app.setupPin.length===4)setTimeout(()=>{app.setupStep=2;renderSetup();},200);
}

function setupAdvance(){
  const w=document.getElementById('setupWordInp').value.trim().toLowerCase();
  if(!w){document.getElementById('setupErr').textContent='Enter a word';return;}
  localStorage.setItem(K.PIN,app.setupPin);
  localStorage.setItem(K.WORD,w);
  localStorage.setItem(K.SETUP,'1');
  startLock();
}

/* LOCK — PIN + secret word only */
function startLock(){
  app.lockPin='';
  buildPinGrid('lock');updateDots('',false);
  document.getElementById('lockErr').textContent='';
  show('lock');
}

function handleLockPin(v){
  if(v==='del')app.lockPin=app.lockPin.slice(0,-1);
  else if(app.lockPin.length<4)app.lockPin+=v;
  updateDots(app.lockPin,false);
  document.getElementById('lockErr').textContent='';
  if(app.lockPin.length===4){
    setTimeout(()=>{
      if(app.lockPin===localStorage.getItem(K.PIN)){
        document.getElementById('swordErr').textContent='';
        document.getElementById('swordInp').value='';
        show('sword');
      } else {
        document.getElementById('lockErr').textContent='Wrong PIN';
        app.lockPin='';updateDots('',false);
      }
    },150);
  }
}

function checkSword(){
  const v=document.getElementById('swordInp').value.trim().toLowerCase();
  if(v===localStorage.getItem(K.WORD)){loadEntries();show('heart');}
  else{document.getElementById('swordErr').textContent='Wrong word';}
}

/* HEART */
function dumpVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  if(app.listening){if(app.rec)app.rec.stop();return;}
  const r=new SR();r.continuous=true;r.interimResults=true;r.lang='en-US';
  const mic=document.getElementById('dMic'),lbl=document.getElementById('dMicLbl'),disp=document.getElementById('dumpTxt');
  app.listening=true;mic.classList.add('on');lbl.textContent='Tap to stop';disp.classList.add('filled');
  r.onresult=e=>{const t=Array.from(e.results).map(x=>x[0].transcript).join(' ');disp.textContent=t;app.dumpCapture=t;};
  r.onend=()=>{app.listening=false;mic.classList.remove('on');lbl.textContent='Tap to speak';};
  r.start();app.rec=r;
}

function sendHeart(){
  const v=app.dumpCapture,t=document.getElementById('heartTxt').value.trim();
  const combined=(v+' '+t).trim();if(!combined)return;
  const btn=document.getElementById('sendBtn');btn.disabled=true;
  const card=document.getElementById('aiCard'),content=document.getElementById('aiContent');
  card.classList.add('on');
  content.innerHTML='<div class="thinking"><div class="thdot"></div><div class="thdot"></div><div class="thdot"></div></div>';
  callAI(combined).then(html=>{content.innerHTML=html;btn.disabled=false;saveEntry(combined,extractMoods(combined));loadEntries();})
  .catch(()=>{content.innerHTML='<p class="ai-text">'+localInsight(combined)+'</p>'+moodHtml(extractMoods(combined));btn.disabled=false;saveEntry(combined,extractMoods(combined));loadEntries();});
}

async function callAI(text){
  const key=localStorage.getItem(K.GKEY)||'';
  if(!key)return'<p class="ai-text">'+localInsight(text)+'</p>'+moodHtml(extractMoods(text));
  const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+key,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:`Tu ek private, caring AI journal saathi hai. Is personal entry ko 3-4 sentences mein analyze kar. Emotional patterns, recurring themes, aur mood detect kar. Warm, insightful, non-judgmental reh. Urdu/Hinglish mein jawab de user ki tone se match karke. Entry: "${text}"`}]}]})
  });
  const d=await res.json();
  const aiTxt=d.candidates?.[0]?.content?.parts?.[0]?.text||localInsight(text);
  return'<p class="ai-text">'+aiTxt+'</p>'+moodHtml(extractMoods(text));
}

function localInsight(t){
  const l=t.toLowerCase();let s='Jo tumne share kiya, woh important hai. ';
  if(l.match(/udas|akela|alone/))s+='Udaasi feel ho rahi hai — yeh valid hai, acknowledge karo. ';
  if(l.match(/khushi|happy|acha/))s+='Kuch positivity bhi hai tumhare andar. ';
  if(l.match(/dard|hurt|dukh/))s+='Dard hai — express karna pehla qadam hai. ';
  if(l.match(/gussa|angry/))s+='Frustration feel ho rahi hai. ';
  s+='Har baat likho — dimaag halka hota hai.';return s;
}

function extractMoods(t){
  const l=t.toLowerCase(),tags=[];
  if(l.match(/khushi|happy|acha/))tags.push('positive');
  if(l.match(/dard|dukh|sad|rona/))tags.push('pain');
  if(l.match(/dar|anxiety|tension/))tags.push('anxious');
  if(l.match(/udas|akela|alone/))tags.push('lonely');
  if(l.match(/kaam|work|busy/))tags.push('work');
  if(l.match(/gussa|angry/))tags.push('frustrated');
  if(!tags.length)tags.push('reflective');
  return tags;
}

function moodHtml(m){return'<div class="mood-chips">'+m.map(x=>'<span class="mchip">'+x+'</span>').join('')+'</div>';}

function saveEntry(text,moods){
  const e=JSON.parse(localStorage.getItem(K.HENTRIES)||'[]');
  e.unshift({text:text.slice(0,200),moods,date:new Date().toLocaleDateString('en-PK',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})});
  if(e.length>30)e.pop();localStorage.setItem(K.HENTRIES,JSON.stringify(e));
}

function loadEntries(){
  const e=JSON.parse(localStorage.getItem(K.HENTRIES)||'[]');
  const sec=document.getElementById('entriesSection');
  if(!e.length){sec.innerHTML='';return;}
  sec.innerHTML='<div class="entries-lbl">past</div>'+e.slice(0,5).map(x=>`<div class="entry-card"><div class="entry-date">${x.date}</div><div class="entry-text">${x.text}</div><div class="entry-moods">${x.moods.map(m=>'<span class="em">'+m+'</span>').join('')}</div></div>`).join('');
}

/* BIZ */
function bizVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
  if(app.listening){if(app.rec)app.rec.stop();return;}
  const r=new SR();r.continuous=true;r.interimResults=true;r.lang='en-US';
  const mic=document.getElementById('bMic'),lbl=document.getElementById('bMicLbl'),disp=document.getElementById('bizTxt');
  app.listening=true;mic.classList.add('on');lbl.textContent='Tap to stop';disp.classList.add('filled');
  r.onresult=e=>{const t=Array.from(e.results).map(x=>x[0].transcript).join(' ');disp.textContent=t;app.bizCapture=t;};
  r.onend=()=>{app.listening=false;mic.classList.remove('on');lbl.textContent='Tap to record';};
  r.start();app.rec=r;
}

function pickTag(tag){
  app.selTag=tag;
  ['idea','task','reminder'].forEach(t=>{document.getElementById('tg-'+t).className='tg'+(t===tag?' sel':'');});
}

function saveBiz(){
  const text=app.bizCapture||document.getElementById('bizTxt').textContent;
  if(!text||text==='Tap mic — share your idea...')return;
  const n=JSON.parse(localStorage.getItem(K.NOTES)||'[]');
  n.unshift({id:Date.now(),text,tag:app.selTag,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  localStorage.setItem(K.NOTES,JSON.stringify(n));
  app.bizCapture='';
  document.getElementById('bizTxt').textContent='Tap mic — share your idea...';
  document.getElementById('bizTxt').classList.remove('filled');
  loadNotes();showToast('Saved!');
}

function loadNotes(){
  const n=JSON.parse(localStorage.getItem(K.NOTES)||'[]');
  const c=document.getElementById('notesContainer');
  if(!n.length){c.innerHTML='<div class="no-notes">No notes yet</div>';return;}
  c.innerHTML=n.slice(0,15).map(x=>`<div class="nc"><div class="nc-top"><span class="ntag">${x.tag}</span><span class="ntime">${x.time}</span></div><div class="ntext">${x.text}</div></div>`).join('');
}

pickTag('idea');
</script>
